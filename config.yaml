# KORANI configuration — LOCAL profile (default).
#
# All models are open-weight, served locally by Ollama behind its
# OpenAI-compatible endpoint. Swap any model by editing this file — agent
# code never hardcodes a model name. (vLLM also works — change base_url to
# http://localhost:8000/v1 — but Ollama is the supported default: it
# auto-loads/unloads models per request, so a sequential A–F run needs no
# server orchestration.)
#
# Model assignment policy (see CLAUDE.md): best-fit per role, with FAMILY
# DIVERSITY on purpose — judging roles (Evaluator, Result Analyst) come from
# different model families than the roles they judge (Engineer), so blind
# spots don't correlate. Every model below fits a single 80GB GPU; Ollama
# swaps them in and out automatically.
#
# Pull them once:
#   ollama pull gemma3:12b gemma3:27b qwen3:32b mistral-small3.2:24b \
#     qwen2.5-coder:32b qwen2.5-coder:14b qwen2.5vl:32b deepseek-r1:32b
#   KONI (see README): pull hf.co/QuantFactory/KONI-Llama3.1-8B-Instruct-
#     20241024-GGUF:Q4_K_M, then `ollama cp` it to the name "koni"
# Ollama library tags drift over time — verify with `ollama search <name>`.

llm:
  # Ollama default endpoint. vLLM alternative: http://localhost:8000/v1
  base_url: "http://localhost:11434/v1"
  api_key: "not-needed"          # local servers ignore this; env KORANI_LLM_API_KEY overrides

models:
  # Stage A — Korean user boundary: KONI (KISTI, Llama-based, Korean
  # science/tech domain-tuned). The one non-negotiable role/model pairing.
  interpreter: "koni"

  # Stage B — Search Planner: small & frequent, low stakes. Gemma (Google)
  # family for diversity from the Qwen-heavy engineering side.
  search_planner: "gemma3:12b"

  # Stage B — Paper Triage: mid-size judgment (reproducibility scoring).
  paper_triage: "gemma3:27b"

  # Stage C — Spec Extractor ⚠ RISK STAGE: strongest structured-extraction
  # model that fits one 80GB GPU.
  spec_extractor: "qwen3:32b"

  # Stage D — Evaluator: judges what the Engineer must satisfy — kept in a
  # DIFFERENT family (Mistral) than the Engineer (Qwen) on purpose.
  evaluator: "mistral-small3.2:24b"

  # Stage E — coding models. Engineer gets the strongest open coder;
  # Debugger shares the family (it fixes the Engineer's code) but smaller —
  # bounded retries favor speed.
  engineer: "qwen2.5-coder:32b"
  debugger: "qwen2.5-coder:14b"

  # Stage F — Result Analyst ⚠ RISK STAGE: needs VISION to compare plots.
  # Qwen2.5-VL is the strongest open chart/plot reader at this size;
  # gemma3:27b is a vision-capable alternative if more family diversity is
  # wanted here. Text-only fallback engages automatically otherwise.
  result_analyst: "qwen2.5vl:32b"

  # Escalation rung 2 only — Proposer+Critic share one REASONING model
  # (thinking mode); DeepSeek-R1 also adds a fourth family to the mix.
  proposer_critic: "deepseek-r1:32b"

data_dir: "data"           # korani.db, papers/, specs/ live here

extraction:
  max_chars: 24000         # paper text budget PER LLM call for the Spec Extractor
  chunk_overlap: 2000      # overlap between chunks of a long paper (two-pass extraction)
  max_chunks: 6            # cost cap — text beyond max_chars*max_chunks is truncated

search:
  providers: ["openalex", "semanticscholar"]
  per_query_limit: 10      # results fetched per query per provider
  max_candidates: 12       # candidates sent to LLM triage after dedup/pre-rank
  shortlist_size: 5        # entries shown to the user
  mailto: ""               # your email → OpenAlex polite pool (recommended)

generation:
  temperature: 0.2
  max_tokens: 1024

execution:
  timeout_seconds: 900     # wall-clock limit per solver run (stage E)

budget:
  # Budget the solver, not just tokens (CLAUDE.md): per-task cap on
  # simulation executions. Stage E variants, debug retries, AND the stage F
  # escalation rungs all draw from this one pool.
  max_solver_runs: 6
  max_debug_retries: 2     # Debugger attempts per variant (bounded retries)
  max_variants: 2          # branch-on-ambiguity fan-out (best-of-N, NOT a tree)

analysis:
  use_vision: true         # attach plot/page images for the Result Analyst
  max_curve_points: 40     # CSV rows shown to the analyst as text
