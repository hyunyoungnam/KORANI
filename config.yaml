# KORANI configuration
#
# All models are open-weight and served locally behind an OpenAI-compatible
# endpoint (vLLM or Ollama). Swap any model by editing this file — agent code
# never hardcodes a model name. A commercial API can be plugged in later by
# changing base_url/api_key; the client code is provider-agnostic.

llm:
  # vLLM default: http://localhost:8000/v1
  # Ollama default: http://localhost:11434/v1
  base_url: "http://localhost:11434/v1"
  api_key: "not-needed"          # local servers ignore this; env KORANI_LLM_API_KEY overrides

models:
  # Role → model name as known to the serving endpoint.
  # KONI via vLLM:   KISTI-KONI/KONI-Llama3.1-8B-Instruct-20241024
  # KONI via Ollama: the name you pulled/created (see README), e.g.
  #   hf.co/RichardErkhov/KISTI-KONI_-_KONI-Llama3-8B-Instruct-20240729-gguf:Q4_K_M
  interpreter: "koni"

  # Stage B/C agents. Defaults reuse the same served model so a single
  # `ollama pull` is enough to test; per CLAUDE.md tiering, paper_triage and
  # especially spec_extractor (RISK STAGE) benefit from a stronger model
  # (e.g. qwen3:32b) when available.
  search_planner: "qwen2.5:7b"
  paper_triage: "qwen2.5:7b"
  spec_extractor: "qwen2.5:7b"

  # Stage D: drafts the evaluation contract (expected values, tolerances)
  # from the spec — a mid-strong model (e.g. qwen3:32b) is recommended.
  evaluator: "qwen2.5:7b"

  # Stage E: coding models per CLAUDE.md tiering — engineer wants
  # qwen2.5-coder:32b / qwen3-coder; debugger can be smaller
  # (e.g. qwen2.5-coder:14b). Defaults reuse the single test model.
  engineer: "qwen2.5:7b"
  debugger: "qwen2.5:7b"

  # Stage F: the Result Analyst is a ⚠ RISK STAGE — a VISION model
  # (e.g. qwen2.5-vl:32b) is strongly recommended so it can compare plots;
  # with a text-only model it falls back to downsampled curve data.
  # Proposer+Critic (escalation rung 2 only) share one reasoning-model slot.
  result_analyst: "qwen2.5:7b"
  proposer_critic: "qwen2.5:7b"

data_dir: "data"           # korani.db, papers/, specs/ live here

extraction:
  max_chars: 24000         # paper text budget PER LLM call for the Spec Extractor
  chunk_overlap: 2000      # overlap between chunks of a long paper (two-pass extraction)
  max_chunks: 6            # cost cap — text beyond max_chars*max_chunks is truncated

search:
  providers: ["openalex", "semanticscholar"]
  per_query_limit: 10      # results fetched per query per provider
  max_candidates: 12       # candidates sent to LLM triage after dedup/pre-rank
  shortlist_size: 5        # entries shown to the user
  mailto: ""               # your email → OpenAlex polite pool (recommended)

generation:
  temperature: 0.2
  max_tokens: 1024

execution:
  timeout_seconds: 900     # wall-clock limit per solver run (stage E)

budget:
  # Budget the solver, not just tokens (CLAUDE.md): per-task cap on
  # simulation executions. Stage E variants, debug retries, AND the stage F
  # escalation rungs all draw from this one pool.
  max_solver_runs: 6
  max_debug_retries: 2     # Debugger attempts per variant (bounded retries)
  max_variants: 2          # branch-on-ambiguity fan-out (best-of-N, NOT a tree)

analysis:
  use_vision: true         # attach plot/page images for the Result Analyst
  max_curve_points: 40     # CSV rows shown to the analyst as text
